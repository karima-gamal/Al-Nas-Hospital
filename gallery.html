 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gallery</title>
    <style>
     .gallery{
        padding: 80px;
        background: #f9f9f9;
        text-align: center;
     }
     .gallery h2{
    font-size:32px;
    margin-bottom:40px;
}


.gallery-contaner{
    display:grid;
    grid-template-columns: repeat(3, 1fr); /* 3 صور بس */
    gap:25px;
}

.gallery-contaner img{
    width:100%;
    height:250px;
    object-fit:cover;
    border-radius:15px;
    transition:0.4s;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.gallery-contaner img:hover{
    transform:scale(1.05);
}
    </style>

     
</head>
<body>
