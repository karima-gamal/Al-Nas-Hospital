 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appointment</title>
    <style>

        *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background:#f4f8f9;
}

.appointment{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px;
}

.form-container{
    background:white;
    width:100%;
    max-width:700px;
    padding:40px;
    border-radius:15px;
    box-shadow:0 15px 40px rgba(0,0,0,0.1);
}

.form-container h2{
    text-align:center;
    margin-bottom:30px;
}

form .row{
    display:flex;
    gap:20px;
    margin-bottom:20px;
}

input, select, textarea{
    width:100%;
    padding:12px 15px;
    border:1px solid #ddd;
    border-radius:8px;
    outline:none;
    transition:0.3s;
}

input:focus, select:focus, textarea:focus{
    border-color:#1abc9c;
}

textarea{
    resize:none;
    margin-bottom:20px;
}

button{
    width:100%;
    padding:14px;
    border:none;
    background:#1abc9c;
    color:white;
    font-size:16px;
    border-radius:8px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#16a085;
}

/* Responsive */
@media(max-width:600px){
    form .row{
        flex-direction:column;
    }
}

.success-message{
    margin-top:15px;
    background:#e8f9f5;
    color:#16a085;
    padding:12px;
    border-radius:8px;
    display:none;
    text-align:center;
}
    </style>

     
</head>


<body>
 <section class="appointment">
    <div class="form-container">
        <h2>Book an Appointment</h2>
 <form id="appointmentForm">
    <div class="row">
        <input type="text" placeholder="First Name" required>
        <input type="text" placeholder="Last Name" required>
    </div>

    <div class="row">
        <input type="email" placeholder="Email Address">
        <input type="tel" placeholder="Phone Number" required>
    </div>

    <div class="row">
        <select required>
            <option value="">Select Diagnosis</option>
            <option>قلب</option>
            <option>جهاز هضمي</option>
            <option>حروق</option>
            <option>كبد</option>
        </select>
    </div>

    <textarea placeholder="Write your message..." rows="5"></textarea>

    <button type="submit">Make Appointment</button>

    <!-- رسالة النجاح -->
    <p id="successMessage" class="success-message">
        ✅ Your appointment has been sent successfully!
    </p>
</form>






<!-- java script -->


<script>
    const form = document.getElementById("appointmentForm");
    const successMessage = document.getElementById("successMessage");

    form.addEventListener("submit", function(e){
        e.preventDefault(); // يمنع الريلود

        successMessage.style.display = "block";

        form.reset(); // يفضي الفورم

        setTimeout(() => {
            successMessage.style.display = "none";
        }, 4000);
    });
</script>
</body>
</html>
