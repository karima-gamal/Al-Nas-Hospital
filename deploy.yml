name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # لو فرعك اسمه مختلف، غيره هنا

permissions:
  contents: read
  pages: write
  id-token: write  # مهم جدًا عشان يحل مشكلة الـ Error

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Deploy to Pages
        uses: actions/deploy-pages@v4
